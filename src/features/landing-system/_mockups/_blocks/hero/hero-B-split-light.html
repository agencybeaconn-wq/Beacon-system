<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hero B · Split Light · Beacon Blocks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['"Inter Tight"','sans-serif'] } } } };
  </script>
  <style>
    body { font-family: 'Inter Tight', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; }
    .container-wide { max-width: 1280px; margin-inline: auto; padding-inline: 1.5rem; }
    @media (min-width: 768px) { .container-wide { padding-inline: 2rem; } }
    .eyebrow { letter-spacing: 0.18em; }
    .bg-light-tonal {
      background-color: #F5F5F5;
      background-image:
        radial-gradient(80% 60% at 50% 0%, rgba(239,68,68,0.07) 0%, transparent 60%),
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='44' height='44'><path d='M 44 0 L 0 0 0 44' fill='none' stroke='%23EF4444' stroke-width='0.4' stroke-opacity='0.06'/></svg>");
    }
    .pill-tag-light {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.375rem 0.875rem; border-radius: 9999px;
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.20);
      color: #DC2626; font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
    }
    .underline-accent { background: linear-gradient(transparent 62%, rgba(239,68,68,0.30) 62%); padding: 0 0.15em; }
  </style>
</head>
<body class="bg-white text-neutral-900">

  <!-- BLOCK: hero-B-split-light -->
  <section class="bg-light-tonal relative overflow-hidden">
    <div class="container-wide pt-20 md:pt-28 pb-20 md:pb-28">
      <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">

        <!-- Esquerda — Copy -->
        <div class="lg:col-span-6">
          <span class="pill-tag-light">
            <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>
            Scale Criativos · Performance
          </span>
          <h1 class="mt-7 text-4xl md:text-6xl lg:text-7xl font-black tracking-tight leading-[1.0] text-neutral-900">
            Criativos feitos<br/>
            pra <span class="underline-accent">escalar</span>.
          </h1>
          <p class="mt-6 text-lg md:text-xl text-neutral-600 leading-relaxed font-light">
            Estrutura criativa pra marcas que querem
            <span class="text-neutral-900 font-medium">vender, testar e escalar</span> no tráfego pago.
          </p>

          <div class="mt-8 flex flex-wrap gap-3">
            <a href="#cta" class="inline-flex items-center justify-center gap-2 h-12 px-7 rounded-md bg-red-500 text-white font-semibold text-base hover:bg-red-600 transition">
              Quero criativos que vendem
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
            </a>
            <a href="#processo" class="inline-flex items-center justify-center gap-2 h-12 px-7 rounded-md bg-white text-neutral-900 border border-neutral-300 font-semibold text-base hover:border-neutral-900 transition">
              Como funciona
            </a>
          </div>

          <div class="mt-10 flex gap-8">
            <div>
              <div class="text-2xl md:text-3xl font-extrabold text-neutral-900">+R$ 8M</div>
              <div class="text-xs uppercase eyebrow text-neutral-500 mt-1">em ads gerenciados</div>
            </div>
            <div>
              <div class="text-2xl md:text-3xl font-extrabold text-neutral-900">120+</div>
              <div class="text-xs uppercase eyebrow text-neutral-500 mt-1">marcas atendidas</div>
            </div>
            <div>
              <div class="text-2xl md:text-3xl font-extrabold text-neutral-900">5x</div>
              <div class="text-xs uppercase eyebrow text-neutral-500 mt-1">ROAS médio</div>
            </div>
          </div>
        </div>

        <!-- Direita — Visual placeholder -->
        <div class="lg:col-span-6">
          <div class="rounded-2xl aspect-[4/3] bg-gradient-to-br from-neutral-900 via-neutral-800 to-red-950 border border-neutral-200 shadow-2xl shadow-red-500/10 flex items-center justify-center">
            <div class="text-center">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="w-16 h-16 text-red-500 mx-auto opacity-50">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <p class="mt-4 text-sm font-medium text-white/40 eyebrow uppercase">hero-banner.png</p>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>
  <!-- /BLOCK -->

</body>
</html>
