<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hero A · Centered Dark · Beacon Blocks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['"Inter Tight"','sans-serif'] } } } };
  </script>
  <style>
    body { font-family: 'Inter Tight', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; }
    .container-wide { max-width: 1280px; margin-inline: auto; padding-inline: 1.5rem; }
    @media (min-width: 768px) { .container-wide { padding-inline: 2rem; } }
    .eyebrow { letter-spacing: 0.18em; }
    .bg-dark-grid {
      background-color: #0A0A0A;
      background-image:
        radial-gradient(70% 60% at 80% 10%, rgba(239,68,68,0.22) 0%, transparent 60%),
        radial-gradient(50% 50% at 10% 90%, rgba(239,68,68,0.10) 0%, transparent 55%),
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40'><path d='M 40 0 L 0 0 0 40' fill='none' stroke='%23EF4444' stroke-width='0.4' stroke-opacity='0.14'/></svg>");
    }
    .pill-tag {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.375rem 0.875rem; border-radius: 9999px;
      background: rgba(239,68,68,0.10); border: 1px solid rgba(239,68,68,0.30);
      color: #EF4444; font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
    }
    .text-italic-accent { font-style: italic; color: #EF4444; }
  </style>
</head>
<body class="bg-black text-white">

  <!-- BLOCK: hero-A-centered-dark -->
  <section class="bg-dark-grid relative overflow-hidden">
    <div class="container-wide pt-20 md:pt-28 pb-20 md:pb-28 text-center">

      <span class="pill-tag">
        <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>
        Sites Shopify · 2026
      </span>

      <h1 class="mt-7 text-5xl md:text-7xl lg:text-8xl font-black tracking-tight leading-[0.95] text-white">
        Loja Shopify pronta<br/>
        pra <span class="text-italic-accent">escalar.</span>
      </h1>

      <p class="mt-7 mx-auto max-w-2xl text-lg md:text-xl text-neutral-300/90 leading-relaxed font-light">
        Tema Beacon proprietário, mobile-first, performance Lighthouse 90+.
        <span class="text-white font-medium">Criação completa em 14 dias.</span>
      </p>

      <div class="mt-10 flex flex-wrap gap-3 justify-center">
        <a href="#cta" class="inline-flex items-center justify-center gap-2 h-12 px-7 rounded-md bg-red-500 text-white font-semibold text-base hover:bg-red-600 transition">
          Quero minha loja
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
        <a href="#planos" class="inline-flex items-center justify-center gap-2 h-12 px-7 rounded-md bg-white/5 text-white border border-white/15 font-semibold text-base hover:bg-white/10 transition">
          Ver planos
        </a>
      </div>

      <div class="mt-14 grid grid-cols-2 md:grid-cols-4 max-w-3xl mx-auto gap-6 text-center">
        <div>
          <div class="text-3xl md:text-4xl font-extrabold text-red-500">14 dias</div>
          <div class="text-xs uppercase eyebrow text-white/55 mt-1.5">até live</div>
        </div>
        <div class="md:border-x md:border-white/10">
          <div class="text-3xl md:text-4xl font-extrabold text-red-500">90+</div>
          <div class="text-xs uppercase eyebrow text-white/55 mt-1.5">Lighthouse</div>
        </div>
        <div class="md:border-r md:border-white/10">
          <div class="text-3xl md:text-4xl font-extrabold text-red-500">50+</div>
          <div class="text-xs uppercase eyebrow text-white/55 mt-1.5">lojas no ar</div>
        </div>
        <div>
          <div class="text-3xl md:text-4xl font-extrabold text-red-500">Mobile</div>
          <div class="text-xs uppercase eyebrow text-white/55 mt-1.5">first</div>
        </div>
      </div>

    </div>
  </section>
  <!-- /BLOCK -->

</body>
</html>
