<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Manifesto A · Split Dark · Beacon Blocks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['"Inter Tight"','sans-serif'] } } } };
  </script>
  <style>
    body { font-family: 'Inter Tight', sans-serif; font-weight: 300; -webkit-font-smoothing: antialiased; }
    .container-wide { max-width: 1280px; margin-inline: auto; padding-inline: 1.5rem; }
    @media (min-width: 768px) { .container-wide { padding-inline: 2rem; } }
    .eyebrow { letter-spacing: 0.18em; }
    .bg-black-grid {
      background-color: #000000;
      background-image:
        url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='44' height='44'><path d='M 44 0 L 0 0 0 44' fill='none' stroke='%23EF4444' stroke-width='0.35' stroke-opacity='0.10'/></svg>");
    }
    .bg-dark-glow {
      background-color: #0A0A0A;
      background-image:
        radial-gradient(60% 60% at 80% 30%, rgba(239,68,68,0.30) 0%, transparent 60%),
        radial-gradient(40% 40% at 20% 80%, rgba(239,68,68,0.18) 0%, transparent 55%);
    }
    .pill-tag {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.375rem 0.875rem; border-radius: 9999px;
      background: rgba(239,68,68,0.10); border: 1px solid rgba(239,68,68,0.30);
      color: #EF4444; font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
    }
    .underline-accent { background: linear-gradient(transparent 62%, rgba(239,68,68,0.40) 62%); padding: 0 0.15em; }
    .text-italic-accent { font-style: italic; color: #EF4444; }
  </style>
</head>
<body class="bg-black text-white">

  <!-- BLOCK: manifesto-A-split-dark -->
  <section id="manifesto" class="bg-black-grid relative">
    <div class="container-wide py-20 md:py-28">

      <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-start">

        <!-- Esquerda — Headline -->
        <div class="lg:col-span-5">
          <span class="pill-tag">
            <span class="w-1.5 h-1.5 rounded-full bg-red-500"></span>
            Posicionamento
          </span>
          <h2 class="mt-6 text-3xl md:text-5xl font-black tracking-tight leading-tight text-white">
            Não é só uma loja.<br/>
            É uma <span class="underline-accent">operação de venda</span><br/>
            pronta pra escalar.
          </h2>
        </div>

        <!-- Direita — Statement card -->
        <div class="lg:col-span-7">
          <div class="rounded-2xl bg-dark-glow p-8 md:p-12 border border-red-500/15">
            <div class="pill-tag">— Frase de posicionamento</div>
            <p class="mt-5 text-2xl md:text-3xl font-bold leading-snug text-white">
              Loja Shopify completa, do tema ao ROAS.
              <span class="text-italic-accent">Tema próprio Beacon + IA na construção.</span>
              Em 14 dias no ar.
            </p>

            <div class="mt-8 grid grid-cols-3 gap-6">
              <div>
                <div class="text-3xl font-extrabold text-red-500">14d</div>
                <div class="text-xs uppercase eyebrow text-white/55 mt-1.5">até live</div>
              </div>
              <div class="border-x border-white/10 px-6">
                <div class="text-3xl font-extrabold text-red-500">90+</div>
                <div class="text-xs uppercase eyebrow text-white/55 mt-1.5">Lighthouse</div>
              </div>
              <div>
                <div class="text-3xl font-extrabold text-red-500">0</div>
                <div class="text-xs uppercase eyebrow text-white/55 mt-1.5">fidelidade</div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>
  <!-- /BLOCK -->

</body>
</html>
